{% extends "base.html" %}
{% block content %}

<div class="terminal-output">
    <span class="line dim">[*] 正在建立安全连接...</span>
    <span class="line green">[+] 注册服务已就绪 (TLS 1.3)</span>
    <hr class="terminal-divider">
</div>

{% if error %}
<div class="terminal-error">{{ error }}</div>
{% endif %}

<form method="POST" action="/register" class="terminal-form">
    <div class="terminal-field">
        <label class="field-prompt" for="username">用户名 / Username</label>
        <input type="text" id="username" name="username" class="terminal-input"
               placeholder="输入用户名" required>
    </div>

    <div class="terminal-field">
        <label class="field-prompt" for="password">密码 / Password</label>
        <input type="password" id="password" name="password" class="terminal-input"
               placeholder="············" required>
    </div>

    <div class="terminal-field">
        <label class="field-prompt" for="email">邮箱 / Email</label>
        <input type="email" id="email" name="email" class="terminal-input"
               placeholder="user@example.com">
    </div>

    <div class="terminal-field">
        <label class="field-prompt" for="phone">手机 / Phone</label>
        <input type="text" id="phone" name="phone" class="terminal-input"
               placeholder="13800138000">
    </div>

    <button type="submit" class="terminal-btn success">
        <span class="btn-arrow">→</span> 注 册 / REGISTER
    </button>
</form>

{% endblock %}
